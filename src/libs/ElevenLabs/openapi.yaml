            - type: string
            - type: 'null'
          description: Optional human-readable label for the condition used throughout the UI.
        type:
          const: expression
          title: Type
          type: string
          default: expression
        expression:
          title: Expression
          oneOf:
            - description: String literal.
              $ref: '#/components/schemas/ASTStringNode-Input'
            - description: Number literal.
              $ref: '#/components/schemas/ASTNumberNode-Input'
            - description: Boolean literal.
              $ref: '#/components/schemas/ASTBooleanNode-Input'
            - description: Prompt evaluated by an LLM to a boolean value.
              $ref: '#/components/schemas/ASTLLMNode-Input'
            - description: Reference to a dynamic variable.
              $ref: '#/components/schemas/ASTDynamicVariableNode-Input'
            - description: Evaluates to true if any child is true.
              $ref: '#/components/schemas/ASTOrOperatorNode-Input'
            - description: Evaluates to true if all children are true.
              $ref: '#/components/schemas/ASTAndOperatorNode-Input'
            - description: Evaluates to true if the left value equals the right.
              $ref: '#/components/schemas/ASTEqualsOperatorNode-Input'
            - description: Evaluates to true if the left value does not equal the right.
              $ref: '#/components/schemas/ASTNotEqualsOperatorNode-Input'
            - description: Evaluates to true if the left value is greater than the right.
              $ref: '#/components/schemas/ASTGreaterThanOperatorNode-Input'
            - description: Evaluates to true if the left value is less than the right.
              $ref: '#/components/schemas/ASTLessThanOperatorNode-Input'
            - description: Evaluates to true if the left value is greater than or equal to the right.
              $ref: '#/components/schemas/ASTGreaterThanOrEqualsOperatorNode-Input'
            - description: Evaluates to true if the left value is less than or equal to the right.
              $ref: '#/components/schemas/ASTLessThanOrEqualsOperatorNode-Input'
          description: Expression to evaluate.
          discriminator:
            propertyName: type
            mapping:
              and_operator: '#/components/schemas/ASTAndOperatorNode-Input'
              boolean_literal: '#/components/schemas/ASTBooleanNode-Input'
              dynamic_variable: '#/components/schemas/ASTDynamicVariableNode-Input'
              eq_operator: '#/components/schemas/ASTEqualsOperatorNode-Input'
              gt_operator: '#/components/schemas/ASTGreaterThanOperatorNode-Input'
              gte_operator: '#/components/schemas/ASTGreaterThanOrEqualsOperatorNode-Input'
              llm: '#/components/schemas/ASTLLMNode-Input'
              lt_operator: '#/components/schemas/ASTLessThanOperatorNode-Input'
              lte_operator: '#/components/schemas/ASTLessThanOrEqualsOperatorNode-Input'
              neq_operator: '#/components/schemas/ASTNotEqualsOperatorNode-Input'
              number_literal: '#/components/schemas/ASTNumberNode-Input'
              or_operator: '#/components/schemas/ASTOrOperatorNode-Input'
              string_literal: '#/components/schemas/ASTStringNode-Input'
