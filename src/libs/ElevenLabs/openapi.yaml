      title: SystemToolConfig
      required:
        - name
        - params
      type: object
      properties:
        type:
          const: system
          title: Type
          type: string
          description: The type of tool
          default: system
        name:
          title: Name
          minLength: 0
          pattern: '^[a-zA-Z0-9_-]{1,64}$'
          type: string
        description:
          title: Description
          minLength: 0
          type: string
          description: Description of when the tool should be used and what it does. Leave empty to use the default description that's optimized for the specific tool type.
          default: ''
        response_timeout_secs:
          title: Response Timeout Secs
          type: integer
          description: The maximum time in seconds to wait for the tool call to complete.
          default: 20
        disable_interruptions:
          title: Disable Interruptions
          type: boolean
          description: 'If true, the user will not be able to interrupt the agent while this tool is running.'
          default: false
        force_pre_tool_speech:
          title: Force Pre Tool Speech
          type: boolean
          description: 'If true, the agent will speak before the tool call.'
          default: false
        assignments:
          title: Assignments
          type: array
          items:
            $ref: '#/components/schemas/DynamicVariableAssignment'
          description: Configuration for extracting values from tool responses and assigning them to dynamic variables
        tool_call_sound:
          anyOf:
            - $ref: '#/components/schemas/ToolCallSoundType'
            - type: 'null'
          description: 'Predefined tool call sound type to play during tool execution. If not specified, no tool call sound will be played.'
          x-convai-client-override: true
        tool_call_sound_behavior:
          description: 'Determines when the tool call sound should play. ''auto'' only plays when there''s pre-tool speech, ''always'' plays for every tool call.'
          default: auto
          $ref: '#/components/schemas/ToolCallSoundBehavior'
        tool_error_handling_mode:
          description: 'Controls how tool errors are processed before being shared with the agent. ''auto'' determines handling based on tool type (summarized for native integrations, hide for others), ''summarized'' sends an LLM-generated summary, ''passthrough'' sends the raw error, ''hide'' does not share the error with the agent.'
          default: auto
          $ref: '#/components/schemas/ToolErrorHandlingMode'
        params:
          title: Params
          oneOf:
            - $ref: '#/components/schemas/EndCallToolConfig'
            - $ref: '#/components/schemas/LanguageDetectionToolConfig'
            - $ref: '#/components/schemas/TransferToAgentToolConfig'
            - $ref: '#/components/schemas/TransferToNumberToolConfig-Output'
            - $ref: '#/components/schemas/SkipTurnToolConfig'
            - $ref: '#/components/schemas/PlayDTMFToolConfig'
            - $ref: '#/components/schemas/VoicemailDetectionToolConfig'
            - $ref: '#/components/schemas/MemoryEntrySearchToolConfig'
            - $ref: '#/components/schemas/MemoryEntryCreateToolConfig'
            - $ref: '#/components/schemas/MemoryEntryUpdateToolConfig'
            - $ref: '#/components/schemas/MemoryEntryDeleteToolConfig'
            - $ref: '#/components/schemas/AgentPromptChangeToolConfig'
          discriminator:
            propertyName: system_tool_type
            mapping:
              agent_prompt_change: '#/components/schemas/AgentPromptChangeToolConfig'
              end_call: '#/components/schemas/EndCallToolConfig'
              language_detection: '#/components/schemas/LanguageDetectionToolConfig'
              memory_entry_create: '#/components/schemas/MemoryEntryCreateToolConfig'
              memory_entry_delete: '#/components/schemas/MemoryEntryDeleteToolConfig'
              memory_entry_search: '#/components/schemas/MemoryEntrySearchToolConfig'
              memory_entry_update: '#/components/schemas/MemoryEntryUpdateToolConfig'
              play_keypad_touch_tone: '#/components/schemas/PlayDTMFToolConfig'
              skip_turn: '#/components/schemas/SkipTurnToolConfig'
              transfer_to_agent: '#/components/schemas/TransferToAgentToolConfig'
              transfer_to_number: '#/components/schemas/TransferToNumberToolConfig-Output'
              voicemail_detection: '#/components/schemas/VoicemailDetectionToolConfig'
      description: A system tool is a tool that is used to call a system method in the server
