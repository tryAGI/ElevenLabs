    LLMDeprecationConfigModel:
      title: LLMDeprecationConfigModel
      required:
        - warning_start_days
        - fallback_start_days
        - fallback_complete_days
        - fallback_start_percentage
        - fallback_complete_percentage
      type: object
      properties:
        warning_start_days:
          title: Warning Start Days
          type: integer
          description: Number of days before the provider deprecation date when warnings start being shown.
        fallback_start_days:
          title: Fallback Start Days
          type: integer
          description: Number of days before the provider deprecation date when traffic starts being routed to the replacement model.
        fallback_complete_days:
          title: Fallback Complete Days
          type: integer
          description: Number of days before the provider deprecation date when all traffic is routed to the replacement model.
        fallback_start_percentage:
          title: Fallback Start Percentage
          type: integer
          description: Percentage of traffic routed to the replacement model when fallback begins.
        fallback_complete_percentage:
          title: Fallback Complete Percentage
          type: integer
          description: Percentage of traffic routed to the replacement model when fallback is complete.
      example:
        fallback_complete_days: 7
        fallback_complete_percentage: 100
        fallback_start_days: 14
        fallback_start_percentage: 25
        warning_start_days: 30
    LLMDeprecationInfoModel:
      title: LLMDeprecationInfoModel
      required:
        - llm
        - is_deprecated
      type: object
      properties:
        llm:
          description: The identifier of the deprecated LLM model.
          $ref: '#/components/schemas/LLM'
        is_deprecated:
          title: Is Deprecated
          type: boolean
          description: Whether this model is currently deprecated. True if the model is immediately deprecated or within the warning period.
        is_in_warning_period:
          title: Is In Warning Period
          type: boolean
          description: Whether this model is currently in the warning period before deprecation.
          default: false
        is_in_fallback_period:
          title: Is In Fallback Period
          type: boolean
          description: Whether traffic is currently being progressively routed to the replacement model.
          default: false
        fallback_percentage:
          title: Fallback Percentage
          type: integer
          description: Current percentage of traffic being routed to the replacement model (0-100).
          default: 0
        provider_deprecation_date:
          title: Provider Deprecation Date
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          description: The date when the model provider will deprecate this model. Null for immediately deprecated models.
        replacement_model:
          anyOf:
            - $ref: '#/components/schemas/LLM'
            - type: 'null'
          description: The model that replaces this deprecated model. Traffic will be automatically routed to this model.
        deprecation_config:
          anyOf:
            - $ref: '#/components/schemas/LLMDeprecationConfigModel'
            - type: 'null'
          description: Custom deprecation timing configuration for this model. Null if using the default configuration.
      example:
        fallback_percentage: 0
        is_deprecated: true
        is_in_fallback_period: false
        is_in_warning_period: true
        llm: gpt-4o-mini
        provider_deprecation_date: '2025-06-01T00:00:00Z'
        replacement_model: gpt-4o
    LLMInfoModel-Input:
      title: LLMInfoModel
      required:
        - llm
        - is_checkpoint
        - max_tokens_limit
        - max_context_limit
        - supports_image_input
        - supports_document_input
        - supports_parallel_tool_calls
      type: object
      properties:
        llm:
          description: The model identifier.
          $ref: '#/components/schemas/LLM'
        is_checkpoint:
          title: Is Checkpoint
          type: boolean
          description: Whether this is a pinned checkpoint version of a model rather than a top-level alias.
        max_tokens_limit:
          title: Max Tokens Limit
          type: integer
          description: Maximum number of output tokens the model can generate.
        max_context_limit:
          title: Max Context Limit
          type: integer
          description: Maximum number of input context tokens the model supports.
        supports_image_input:
          title: Supports Image Input
          type: boolean
          description: Whether the model supports image file inputs during conversations.
        supports_document_input:
          title: Supports Document Input
          type: boolean
          description: Whether the model supports document (PDF) file inputs during conversations.
        supports_parallel_tool_calls:
          title: Supports Parallel Tool Calls
          type: boolean
          description: Whether the model supports calling multiple tools in parallel.
        available_reasoning_efforts:
          title: Available Reasoning Efforts
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/LLMReasoningEffort'
            - type: 'null'
          description: Available reasoning effort levels for this model. Null if the model does not support configurable reasoning.
        deprecation_info:
          anyOf:
            - $ref: '#/components/schemas/LLMDeprecationInfoModel'
            - type: 'null'
          description: Deprecation information if this model is deprecated or scheduled for deprecation. Null if the model is not affected.
      example:
        is_checkpoint: false
        llm: gemini-2.5-flash
        max_context_limit: 1048576
        max_tokens_limit: 8192
        supports_document_input: true
        supports_image_input: true
        supports_parallel_tool_calls: true
