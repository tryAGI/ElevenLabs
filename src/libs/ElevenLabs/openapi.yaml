            start: 0.1
            text: e
          - end: 0.3
            start: 0.2
            text: l
          - end: 0.4
            start: 0.3
            text: l
          - end: 0.5
            start: 0.4
            text: o
        end: 0.5
        logprob: -0.124
        speaker_id: speaker_1
        start: 0.0
        text: Hello
        type: word
