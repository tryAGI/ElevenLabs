              - description: Terminates the conversation upon reaching this node.
                $ref: '#/components/schemas/WorkflowEndNodeModel-Input'
              - description: Transfers the conversation to a phone number.
                $ref: '#/components/schemas/WorkflowPhoneNumberNodeModel-Input'
              - description: 'A subagent conducting the conversation until one of the exit conditions is met. Each subagent can override the base settings, changing the prompt, knowledge base, and more.'
                $ref: '#/components/schemas/WorkflowOverrideAgentNodeModel-Input'
              - description: Transfer the conversation to a standalone agent.
                $ref: '#/components/schemas/WorkflowStandaloneAgentNodeModel-Input'
              - description: Executes one or more tools in parallel.
                $ref: '#/components/schemas/WorkflowToolNodeModel-Input'
            discriminator:
              propertyName: type
              mapping:
                end: '#/components/schemas/WorkflowEndNodeModel-Input'
                override_agent: '#/components/schemas/WorkflowOverrideAgentNodeModel-Input'
                phone_number: '#/components/schemas/WorkflowPhoneNumberNodeModel-Input'
                standalone_agent: '#/components/schemas/WorkflowStandaloneAgentNodeModel-Input'
                start: '#/components/schemas/WorkflowStartNodeModel-Input'
                tool: '#/components/schemas/WorkflowToolNodeModel-Input'
        prevent_subagent_loops:
          title: Prevent Subagent Loops
          type: boolean
          description: Whether to prevent loops in the workflow execution.
          default: false
      example:
        edges:
          entry_to_tool_a:
            forward_condition:
              condition: Tool A condition
            source: entry_node
            target: tool_node_a
          start_to_entry:
            forward_condition: { }
            source: start_node
            target: entry_node
          tool_a_to_failure:
            forward_condition:
              successful: false
            source: tool_node_a
            target: failure_node
          tool_a_to_tool_b:
            forward_condition:
              successful: true
            source: tool_node_a
            target: tool_node_b
          tool_b_to_agent_transfer:
            forward_condition: { }
            source: tool_node_b
            target: success_transfer
          tool_b_to_conversation:
            forward_condition:
              condition: Conversation condition
            source: tool_node_b
            target: success_conversation
          tool_b_to_end:
            forward_condition:
              condition: End condition
            source: tool_node_b
            target: success_end
          tool_b_to_phone:
            forward_condition:
              expression:
                children:
                  - name: force_phone_transfer
                  - prompt: Phone condition
                  - left:
                      name: mode
                    right:
                      value: dev
            source: tool_node_b
            target: success_phone
        nodes:
          entry_node:
            conversation_config: { }
            edge_order:
              - entry_to_tool_a
            label: Entry
          failure_node:
            conversation_config: { }
            label: Failure
          start_node:
            edge_order:
              - start_to_entry
          success_conversation:
            conversation_config: { }
            label: Success A
          success_end: { }
          success_phone:
            transfer_destination:
              phone_number: '+1234567890'
          success_transfer:
            agent_id: success_transfer_agent
          tool_node_a:
            edge_order:
              - tool_a_to_failure
              - tool_a_to_tool_b
            tools:
              - tool_id: tool_a
              - tool_id: tool_b
          tool_node_b:
            edge_order:
              - tool_b_to_conversation
              - tool_b_to_end
              - tool_b_to_phone
              - tool_b_to_agent_transfer
            tools:
              - tool_id: tool_a
    AgentWorkflowResponseModel:
