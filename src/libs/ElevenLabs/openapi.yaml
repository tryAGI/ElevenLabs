    GetAgentResponseModel:
      title: GetAgentResponseModel
      required:
        - agent_id
        - name
        - conversation_config
        - metadata
      type: object
      properties:
        agent_id:
          title: Agent Id
          type: string
          description: The ID of the agent
        name:
          title: Name
          type: string
          description: The name of the agent
        conversation_config:
          description: The conversation configuration of the agent
          $ref: '#/components/schemas/ConversationalConfigAPIModel-Output'
        metadata:
          description: The metadata of the agent
          $ref: '#/components/schemas/AgentMetadataResponseModel'
        platform_settings:
          description: The platform settings of the agent
          $ref: '#/components/schemas/AgentPlatformSettingsResponseModel'
        phone_numbers:
          title: Phone Numbers
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/GetPhoneNumberTwilioResponseModel'
              - $ref: '#/components/schemas/GetPhoneNumberSIPTrunkResponseModel'
            discriminator:
              propertyName: provider
              mapping:
                sip_trunk: '#/components/schemas/GetPhoneNumberSIPTrunkResponseModel'
                twilio: '#/components/schemas/GetPhoneNumberTwilioResponseModel'
          description: The phone numbers of the agent
        whatsapp_accounts:
          title: Whatsapp Accounts
          type: array
          items:
            $ref: '#/components/schemas/GetWhatsAppAccountResponse'
          description: WhatsApp accounts assigned to the agent
        workflow:
          description: The workflow of the agent
          $ref: '#/components/schemas/AgentWorkflowResponseModel'
        access_info:
          anyOf:
            - $ref: '#/components/schemas/ResourceAccessInfo'
            - type: 'null'
          description: The access information of the agent for the user
        tags:
          title: Tags
          type: array
          items:
            type: string
          description: Agent tags used to categorize the agent
        version_id:
          title: Version Id
          anyOf:
            - type: string
            - type: 'null'
          description: The ID of the version the agent is on
        branch_id:
          title: Branch Id
          anyOf:
            - type: string
            - type: 'null'
          description: The ID of the branch the agent is on
        main_branch_id:
          title: Main Branch Id
          anyOf:
            - type: string
            - type: 'null'
          description: The ID of the main branch for this agent
      example:
        agent_id: agent_7101k5zvyjhmfg983brhmhkd98n6
        name: My Agent
        workflow:
          edges:
            entry_to_tool_a:
              forward_condition:
                condition: Tool A condition
                type: llm
              source: entry_node
              target: tool_node_a
            start_to_entry:
              forward_condition:
                type: unconditional
              source: start_node
              target: entry_node
            tool_a_to_failure:
              forward_condition:
                successful: false
                type: result
              source: tool_node_a
              target: failure_node
            tool_a_to_tool_b:
              forward_condition:
                successful: true
                type: result
              source: tool_node_a
              target: tool_node_b
            tool_b_to_agent_transfer:
              forward_condition:
                type: unconditional
              source: tool_node_b
              target: success_transfer
            tool_b_to_conversation:
              forward_condition:
                condition: Conversation condition
                type: llm
              source: tool_node_b
              target: success_conversation
            tool_b_to_end:
              forward_condition:
                condition: End condition
                type: llm
              source: tool_node_b
              target: success_end
            tool_b_to_phone:
              forward_condition:
                expression:
                  children:
                    - name: force_phone_transfer
                      type: dynamic_variable
                    - prompt: Phone condition
                      type: llm
                    - left:
                        name: mode
                        type: dynamic_variable
                      right:
                        type: string_literal
                        value: dev
                      type: eq_operator
                  type: or_operator
                type: expression
              source: tool_node_b
              target: success_phone
          nodes:
            entry_node:
              additional_knowledge_base: [ ]
              additional_prompt: ''
              additional_tool_ids: [ ]
              conversation_config: { }
              edge_order:
                - entry_to_tool_a
              label: Entry
              position:
                x: 0.0
                y: 0.0
              type: override_agent
            failure_node:
              additional_knowledge_base: [ ]
              additional_prompt: ''
              additional_tool_ids: [ ]
              conversation_config: { }
              edge_order: [ ]
              label: Failure
              position:
                x: 0.0
                y: 0.0
              type: override_agent
            start_node:
              edge_order:
                - start_to_entry
              position:
                x: 0.0
                y: 0.0
              type: start
            success_conversation:
              additional_knowledge_base: [ ]
              additional_prompt: ''
              additional_tool_ids: [ ]
              conversation_config: { }
              edge_order: [ ]
              label: Success A
              position:
                x: 0.0
                y: 0.0
              type: override_agent
            success_end:
              edge_order: [ ]
              position:
                x: 0.0
                y: 0.0
              type: end
            success_phone:
              custom_sip_headers: [ ]
              edge_order: [ ]
              position:
                x: 0.0
                y: 0.0
              transfer_destination:
                phone_number: '+1234567890'
                type: phone
              transfer_type: conference
              type: phone_number
            success_transfer:
              agent_id: success_transfer_agent
              delay_ms: 0
              edge_order: [ ]
              enable_transferred_agent_first_message: false
              position:
                x: 0.0
                y: 0.0
              type: standalone_agent
            tool_node_a:
              edge_order:
                - tool_a_to_failure
                - tool_a_to_tool_b
              position:
                x: 0.0
                y: 0.0
              tools:
                - tool_id: tool_a
                - tool_id: tool_b
              type: tool
            tool_node_b:
              edge_order:
                - tool_b_to_conversation
                - tool_b_to_end
                - tool_b_to_phone
                - tool_b_to_agent_transfer
              position:
                x: 0.0
                y: 0.0
              tools:
                - tool_id: tool_a
              type: tool
          prevent_subagent_loops: false
