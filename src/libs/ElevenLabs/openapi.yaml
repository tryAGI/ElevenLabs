      title: TurnConfig
      type: object
      properties:
        turn_timeout:
          title: Turn Timeout
          type: number
          description: Maximum wait time for the user's reply before re-engaging the user
          default: 7.0
        initial_wait_time:
          title: Initial Wait Time
          anyOf:
            - type: number
            - type: 'null'
          description: 'How long the agent will wait for the user to start the conversation if the first message is empty. If not set, uses the regular turn_timeout.'
        silence_end_call_timeout:
          title: Silence End Call Timeout
          type: number
          description: Maximum wait time since the user last spoke before terminating the call
          default: -1
        soft_timeout_config:
          description: Configuration for soft timeout functionality. Provides immediate feedback during longer LLM responses.
          $ref: '#/components/schemas/SoftTimeoutConfig'
        mode:
          description: The mode of turn detection
          default: turn
          $ref: '#/components/schemas/TurnMode'
        turn_eagerness:
          description: 'Controls how eager the agent is to respond. Low = less eager (waits longer), Standard = default eagerness, High = more eager (responds sooner)'
          default: normal
          $ref: '#/components/schemas/TurnEagerness'
        spelling_patience:
          description: 'Controls if the agent should be more patient when user is spelling numbers and named entities. Auto = model based, Off = never wait extra'
          default: auto
          $ref: '#/components/schemas/SpellingPatience'
        speculative_turn:
          title: Speculative Turn
          type: boolean
          description: 'When enabled, starts generating LLM responses during silence before full turn confidence is reached, reducing perceived latency. May increase LLM costs.'
          default: false
      example:
        mode: turn
        silence_end_call_timeout: -1.0
        soft_timeout_config:
          message: Hhmmmm...yeah.
          timeout_seconds: -1.0
        speculative_turn: false
        spelling_patience: auto
        turn_eagerness: normal
        turn_timeout: 7.0
    TurnConfigOverride:
      title: TurnConfigOverride
      type: object
      properties:
        soft_timeout_config:
          anyOf:
            - $ref: '#/components/schemas/SoftTimeoutConfigOverride'
            - type: 'null'
          description: Configuration for soft timeout functionality. Provides immediate feedback during longer LLM responses.
      example:
        soft_timeout_config:
          message: Hhmmmm...yeah.
    TurnConfigOverrideConfig:
      title: TurnConfigOverrideConfig
      type: object
      properties:
