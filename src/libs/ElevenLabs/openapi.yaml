    WebhookToolConfig-Input:
      title: WebhookToolConfig
      required:
        - name
        - description
        - api_schema
      type: object
      properties:
        type:
          const: webhook
          title: Type
          type: string
          description: The type of tool
          default: webhook
        name:
          title: Name
          minLength: 0
          pattern: '^[a-zA-Z0-9_-]{1,64}$'
          type: string
        description:
          title: Description
          minLength: 0
          type: string
          description: Description of when the tool should be used and what it does.
        response_timeout_secs:
          title: Response Timeout Secs
          maximum: 120.0
          minimum: 5.0
          type: integer
          description: The maximum time in seconds to wait for the tool call to complete. Must be between 5 and 120 seconds (inclusive).
          default: 20
        disable_interruptions:
          title: Disable Interruptions
          type: boolean
          description: 'If true, the user will not be able to interrupt the agent while this tool is running.'
          default: false
        force_pre_tool_speech:
          title: Force Pre Tool Speech
          type: boolean
          description: 'If true, the agent will speak before the tool call.'
          default: false
        assignments:
          title: Assignments
          type: array
          items:
            $ref: '#/components/schemas/DynamicVariableAssignment'
          description: Configuration for extracting values from tool responses and assigning them to dynamic variables
        tool_call_sound:
          anyOf:
            - $ref: '#/components/schemas/ToolCallSoundType'
            - type: 'null'
          description: 'Predefined tool call sound type to play during tool execution. If not specified, no tool call sound will be played.'
          x-convai-client-override: true
        tool_call_sound_behavior:
          description: 'Determines when the tool call sound should play. ''auto'' only plays when there''s pre-tool speech, ''always'' plays for every tool call.'
          default: auto
          $ref: '#/components/schemas/ToolCallSoundBehavior'
        tool_error_handling_mode:
          description: 'Controls how tool errors are processed before being shared with the agent. ''auto'' determines handling based on tool type (summarized for native integrations, hide for others), ''summarized'' sends an LLM-generated summary, ''passthrough'' sends the raw error, ''hide'' does not share the error with the agent.'
          default: auto
          $ref: '#/components/schemas/ToolErrorHandlingMode'
        dynamic_variables:
          description: Configuration for dynamic variables
          $ref: '#/components/schemas/DynamicVariablesConfig'
        execution_mode:
          description: 'Determines when and how the tool executes: ''immediate'' executes the tool right away when requested by the LLM, ''post_tool_speech'' waits for the agent to finish speaking before executing, ''async'' runs the tool in the background without blocking - best for long-running operations.'
          default: immediate
          $ref: '#/components/schemas/ToolExecutionMode'
        api_schema:
          description: 'The schema for the outgoing webhoook, including parameters and URL specification'
          $ref: '#/components/schemas/WebhookToolApiSchemaConfig-Input'
      description: A webhook tool is a tool that calls an external webhook from our server
      example:
        response_timeout_secs: 20
        type: webhook
