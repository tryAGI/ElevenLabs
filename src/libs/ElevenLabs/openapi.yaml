        - composition_plan
        - song_metadata
        - words_timestamps
      type: object
      properties:
        composition_plan:
          description: The composition plan used to generate the song
          $ref: '#/components/schemas/MusicPrompt'
        song_metadata:
          description: The metadata of the generated song
          $ref: '#/components/schemas/SongMetadata'
        words_timestamps:
          title: Words Timestamps
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/WordTimestamp'
            - type: 'null'
          description: The timestamps of the words in the generated song
      description: Response model for structured music generation endpoint
      example:
        composition_plan:
          negative_global_styles:
            - metal
            - hip-hop
            - country
          positive_global_styles:
            - pop
            - rock
            - jazz
          sections:
            - duration_ms: 10000
              lines:
                - Verse 1 lyrics
              negative_local_styles:
                - metal
                - hip-hop
                - country
              positive_local_styles:
                - pop
                - rock
                - jazz
              section_name: Verse 1
        song_metadata:
          description: My Song Description
          genres:
            - pop
            - rock
            - jazz
          is_explicit: false
          languages:
            - en
            - fr
          title: My Song
        words_timestamps:
          - end_ms: 1000
            start_ms: 0
            word: Verse
          - end_ms: 2000
            start_ms: 1000
            word: '1'
          - end_ms: 3000
            start_ms: 2000
            word: lyrics
