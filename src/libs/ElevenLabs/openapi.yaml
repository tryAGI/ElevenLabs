          default: 20
        disable_interruptions:
          title: Disable Interruptions
          type: boolean
          description: 'If true, the user will not be able to interrupt the agent while this tool is running.'
          default: false
        force_pre_tool_speech:
          title: Force Pre Tool Speech
          type: boolean
          description: 'If true, the agent will speak before the tool call.'
          default: false
        assignments:
          title: Assignments
          type: array
          items:
            $ref: '#/components/schemas/DynamicVariableAssignment'
          description: Configuration for extracting values from tool responses and assigning them to dynamic variables
        tool_call_sound:
          anyOf:
            - $ref: '#/components/schemas/ToolCallSoundType'
            - type: 'null'
          description: 'Predefined tool call sound type to play during tool execution. If not specified, no tool call sound will be played.'
          x-convai-client-override: true
        tool_call_sound_behavior:
          description: 'Determines when the tool call sound should play. ''auto'' only plays when there''s pre-tool speech, ''always'' plays for every tool call.'
          default: auto
          $ref: '#/components/schemas/ToolCallSoundBehavior'
        tool_error_handling_mode:
          description: 'Controls how tool errors are processed before being shared with the agent. ''auto'' determines handling based on tool type (summarized for native integrations, hide for others), ''summarized'' sends an LLM-generated summary, ''passthrough'' sends the raw error, ''hide'' does not share the error with the agent.'
          default: auto
          $ref: '#/components/schemas/ToolErrorHandlingMode'
        integration_type:
          description: The type of MCP tool
          $ref: '#/components/schemas/IntegrationType'
        parameters:
          anyOf:
            - $ref: '#/components/schemas/ObjectJsonSchemaProperty-Output'
            - type: 'null'
          description: Schema for any parameters the LLM needs to provide to the MCP tool.
        approval_policy:
          description: The approval policy for the MCP tool
          default: require_approval_all
          $ref: '#/components/schemas/MCPApprovalPolicy'
        mcp_tool_name:
          title: Mcp Tool Name
          type: string
          description: The name of the MCP tool to call
        mcp_tool_description:
          title: Mcp Tool Description
          type: string
          description: The description of the MCP tool to call
        mcp_server_id:
          title: Mcp Server Id
          type: string
          description: The id of the MCP server to call
        mcp_server_name:
          title: Mcp Server Name
          type: string
          description: The name of the MCP server to call
        mcp_input_schema:
          title: Mcp Input Schema
          anyOf:
            - type: object
            - type: 'null'
          description: Original inputSchema dict for consistent hashing
        execution_mode:
          description: 'Determines when and how the tool executes: ''immediate'' executes the tool right away when requested by the LLM, ''post_tool_speech'' waits for the agent to finish speaking before executing, ''async'' runs the tool in the background without blocking - best for long-running operations.'
          default: immediate
          $ref: '#/components/schemas/ToolExecutionMode'
        input_overrides:
          title: Input Overrides
          anyOf:
            - type: object
              additionalProperties:
                oneOf:
                  - $ref: '#/components/schemas/ConstantSchemaOverride'
                  - $ref: '#/components/schemas/DynamicVariableSchemaOverride'
                  - $ref: '#/components/schemas/LLMSchemaOverride'
                discriminator:
                  propertyName: source
                  mapping:
                    constant: '#/components/schemas/ConstantSchemaOverride'
                    dynamic_variable: '#/components/schemas/DynamicVariableSchemaOverride'
                    llm: '#/components/schemas/LLMSchemaOverride'
            - type: 'null'
          description: Input parameter overrides for this tool
      description: An MCP tool configuration that can be used to call MCP servers
      x-fern-ignore: true
