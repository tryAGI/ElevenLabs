                  - prompt: Phone condition
                    type: llm
                  - left:
                      name: mode
                      type: dynamic_variable
                    right:
                      type: string_literal
                      value: dev
                    type: eq_operator
                type: or_operator
              type: expression
            source: tool_node_b
            target: success_phone
        nodes:
          entry_node:
            additional_knowledge_base: [ ]
            additional_prompt: ''
            additional_tool_ids: [ ]
            conversation_config: { }
            edge_order:
              - entry_to_tool_a
            label: Entry
