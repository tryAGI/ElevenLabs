    WorkflowEdgeModel-Input:
      title: WorkflowEdgeModel
      required:
        - source
        - target
      type: object
      properties:
        source:
          title: Source
          type: string
          description: ID of the source node.
        target:
          title: Target
          type: string
          description: ID of the target node.
        forward_condition:
          title: Forward Condition
          anyOf:
            - oneOf:
                - description: Condition that is always true.
                  $ref: '#/components/schemas/WorkflowUnconditionalModel-Input'
                - description: Condition described using human language and evaluated by an LLM.
                  $ref: '#/components/schemas/WorkflowLLMConditionModel-Input'
                - description: Condition based on the result of the last executed tool dispatch node.
                  $ref: '#/components/schemas/WorkflowResultConditionModel-Input'
                - description: Condition described using a deterministic expression.
                  $ref: '#/components/schemas/WorkflowExpressionConditionModel-Input'
              discriminator:
                propertyName: type
                mapping:
                  expression: '#/components/schemas/WorkflowExpressionConditionModel-Input'
                  llm: '#/components/schemas/WorkflowLLMConditionModel-Input'
                  result: '#/components/schemas/WorkflowResultConditionModel-Input'
                  unconditional: '#/components/schemas/WorkflowUnconditionalModel-Input'
            - type: 'null'
          description: Condition that must be met for the edge to be traversed in the forward direction (source to target).
        backward_condition:
          title: Backward Condition
          anyOf:
            - oneOf:
                - description: Condition that is always true.
                  $ref: '#/components/schemas/WorkflowUnconditionalModel-Input'
                - description: Condition described using human language and evaluated by an LLM.
                  $ref: '#/components/schemas/WorkflowLLMConditionModel-Input'
                - description: Condition based on the result of the last executed tool dispatch node.
                  $ref: '#/components/schemas/WorkflowResultConditionModel-Input'
                - description: Condition described using a deterministic expression.
                  $ref: '#/components/schemas/WorkflowExpressionConditionModel-Input'
              discriminator:
                propertyName: type
                mapping:
                  expression: '#/components/schemas/WorkflowExpressionConditionModel-Input'
                  llm: '#/components/schemas/WorkflowLLMConditionModel-Input'
                  result: '#/components/schemas/WorkflowResultConditionModel-Input'
                  unconditional: '#/components/schemas/WorkflowUnconditionalModel-Input'
            - type: 'null'
          description: Condition that must be met for the edge to be traversed in the backward direction (target to source).
    WorkflowEdgeModel-Output:
      title: WorkflowEdgeModel
      required:
        - source
        - target
        - forward_condition
        - backward_condition
      type: object
      properties:
        source:
          title: Source
          type: string
          description: ID of the source node.
        target:
          title: Target
          type: string
          description: ID of the target node.
        forward_condition:
          title: Forward Condition
          anyOf:
            - oneOf:
                - description: Condition that is always true.
                  $ref: '#/components/schemas/WorkflowUnconditionalModel-Output'
                - description: Condition described using human language and evaluated by an LLM.
                  $ref: '#/components/schemas/WorkflowLLMConditionModel-Output'
                - description: Condition based on the result of the last executed tool dispatch node.
                  $ref: '#/components/schemas/WorkflowResultConditionModel-Output'
                - description: Condition described using a deterministic expression.
                  $ref: '#/components/schemas/WorkflowExpressionConditionModel-Output'
              discriminator:
                propertyName: type
                mapping:
                  expression: '#/components/schemas/WorkflowExpressionConditionModel-Output'
                  llm: '#/components/schemas/WorkflowLLMConditionModel-Output'
                  result: '#/components/schemas/WorkflowResultConditionModel-Output'
                  unconditional: '#/components/schemas/WorkflowUnconditionalModel-Output'
            - type: 'null'
          description: Condition that must be met for the edge to be traversed in the forward direction (source to target).
        backward_condition:
          title: Backward Condition
          anyOf:
            - oneOf:
                - description: Condition that is always true.
                  $ref: '#/components/schemas/WorkflowUnconditionalModel-Output'
                - description: Condition described using human language and evaluated by an LLM.
                  $ref: '#/components/schemas/WorkflowLLMConditionModel-Output'
                - description: Condition based on the result of the last executed tool dispatch node.
                  $ref: '#/components/schemas/WorkflowResultConditionModel-Output'
                - description: Condition described using a deterministic expression.
                  $ref: '#/components/schemas/WorkflowExpressionConditionModel-Output'
              discriminator:
                propertyName: type
