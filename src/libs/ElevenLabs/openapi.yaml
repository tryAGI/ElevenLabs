            type: start
          success_conversation:
            additional_knowledge_base: [ ]
            additional_prompt: ''
            additional_tool_ids: [ ]
            conversation_config: { }
            edge_order: [ ]
            label: Success A
            position:
              x: 0.0
              y: 0.0
            type: override_agent
          success_end:
            edge_order: [ ]
            position:
              x: 0.0
              y: 0.0
            type: end
          success_phone:
            custom_sip_headers: [ ]
            edge_order: [ ]
            position:
              x: 0.0
              y: 0.0
            transfer_destination:
              phone_number: '+1234567890'
              type: phone
            transfer_type: conference
            type: phone_number
          success_transfer:
            agent_id: success_transfer_agent
