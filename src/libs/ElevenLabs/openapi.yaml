              - tool_id: tool_b
            type: tool
          tool_node_b:
            edge_order:
              - tool_b_to_conversation
              - tool_b_to_end
              - tool_b_to_phone
              - tool_b_to_agent_transfer
            position:
              x: 0.0
              y: 0.0
            tools:
              - tool_id: tool_a
