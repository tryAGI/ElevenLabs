                speaker_id: speaker_0
                start: 0.0
                text: Hello
                type: word
              - end: 0.5
                logprob: 0.0
                speaker_id: speaker_0
                start: 0.5
                text: ' '
                type: spacing
              - end: 0.8
                logprob: -0.089
                speaker_id: speaker_0
                start: 0.5
                text: from
                type: word
          - language_code: en
            language_probability: 0.97
            text: Greetings from channel two.
            words:
              - end: 0.7
                logprob: -0.156
                speaker_id: speaker_1
                start: 0.1
                text: Greetings
                type: word
              - end: 0.7
                logprob: 0.0
                speaker_id: speaker_1
                start: 0.7
                text: ' '
                type: spacing
              - end: 1.0
                logprob: -0.078
                speaker_id: speaker_1
                start: 0.7
                text: from
                type: word
