site_name: ElevenLabs .NET Documentation
site_description: Official .NET SDK documentation for ElevenLabs text to speech, speech to text, voice cloning, and realtime APIs.
site_url: https://tryagi.github.io/ElevenLabs/
repo_url: https://github.com/tryAGI/ElevenLabs
repo_name: tryAGI/ElevenLabs
edit_uri: edit/main/docs/
nav:
- Overview: index.md
# EXAMPLES:START
- Examples:
  - List Available Voices: examples/list-available-voices.md
  - Text to Speech: examples/text-to-speech.md
  - Streaming Text to Speech: examples/streaming-text-to-speech.md
  - Streaming Text to Speech with Timestamps: examples/streaming-text-to-speech-with-timestamps.md
  - Sound Generation: examples/sound-generation.md
  - Speech to Text from a File: examples/speech-to-text-from-a-file.md
  - Voice Cloning: examples/voice-cloning.md
  - Realtime Speech to Text: examples/realtime-speech-to-text.md
# EXAMPLES:END
        
theme:
  name: material
  logo: media/icon128.png
  static_templates:
    - 404.html
  language: 'en'
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  include_search_page: false
  search_index_only: true
  favicon: 'media/icon128.png'
  features:
    - content.action.edit
    - content.code.copy
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  font:
    text: 'Space Grotesk'
    code: 'IBM Plex Mono'
  icon:
    repo: 'fontawesome/brands/github'

extra_css:
  - 'css/extra.css?v=22'

extra_javascript:
  - 'js/site.js?v=1'

plugins:
  - search
  - copy-to-llm

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - toc:
      permalink: ""
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
          percent_encode: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.progressbar
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
